<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Token Audit</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Token Audit</h1>
      <p class="subtitle">Design token compliance overlay</p>
    </header>

    <section class="stats" id="stats">
      <div class="stat error">
        <span class="count" id="error-count">—</span>
        <span class="label">Errors</span>
      </div>
      <div class="stat warn">
        <span class="count" id="warn-count">—</span>
        <span class="label">Warnings</span>
      </div>
    </section>

    <div class="actions">
      <button type="button" id="toggle-btn" class="primary">Enable overlay</button>
      <button type="button" id="rescan-btn">Rescan page</button>
    </div>

    <p class="hint" id="status">Open your local dev app, then enable the overlay.</p>

    <script src="popup.js" type="module"></script>
  </body>
</html>
