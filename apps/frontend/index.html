        <h1>SlimVG — Free SVG Optimizer</h1>
        <p>
          Stop shipping SVGs that hurt Android performance. SlimVG automatically optimizes vector
          files, detects complexity, and converts problem assets before they become performance
          issues.
        </p>
        <h2>What SlimVG does</h2>
        <ul>
          <li>
            <strong>Multi-pass SVG compression</strong> — runs optimization iterations until file
            size stabilizes with meaningful byte savings.
          </li>
          <li>
            <strong>Complexity detection</strong> — flags heavy paths, gradients, masks, and
            embedded raster images inside SVGs.
          </li>
          <li>
            <strong>Batch ZIP download</strong> — select multiple optimized assets and download
            them in one bundle.
          </li>
          <li>
            <strong>WebP and PNG conversion</strong> — convert complex SVGs to raster formats when
            vectors are the wrong choice.
          </li>
        </ul>
        <p>
          SlimVG is a free web app for designers and developers. Sign in with Google to upload,
          optimize, and download SVG assets. JavaScript is required to use the app.
        </p>
